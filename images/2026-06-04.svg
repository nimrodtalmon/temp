<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" shape-rendering="crispEdges" role="img" aria-label="Pixel-art lunchbox: two falafel pitas with tahini, baby carrots, cherry tomatoes and a cucumber">
  <!-- counter / table -->
  <rect width="480" height="640" fill="#7c828b"/>
  <rect x="24" y="24" width="432" height="592" fill="#9aa0a8"/>

  <!-- lunchbox: dark rim, sage body, lighter floor -->
  <rect x="40" y="40" width="400" height="560" fill="#3f6e29"/>
  <rect x="52" y="52" width="376" height="536" fill="#8fb98a"/>
  <rect x="64" y="64" width="352" height="512" fill="#a7c4a0"/>

  <!-- ===== cucumber across the top ===== -->
  <g>
    <rect x="120" y="84" width="248" height="78" fill="#4f8233"/>
    <rect x="120" y="84" width="248" height="58" fill="#6fa84b"/>
    <rect x="132" y="92" width="224" height="14" fill="#8fc16a"/>
    <rect x="112" y="100" width="12" height="46" fill="#5d9c3c"/>
    <rect x="364" y="100" width="12" height="46" fill="#5d9c3c"/>
  </g>

  <!-- ===== orange cherry tomato (top-left) ===== -->
  <g>
    <rect x="92" y="176" width="40" height="48" fill="#d2701f"/>
    <rect x="84" y="184" width="56" height="32" fill="#f0922f"/>
    <rect x="92" y="176" width="40" height="40" fill="#f0922f"/>
    <rect x="100" y="184" width="18" height="12" fill="#ffb255"/>
    <rect x="104" y="170" width="10" height="8" fill="#5d9c3c"/>
  </g>

  <!-- ===== red cherry tomato (right) ===== -->
  <g>
    <rect x="356" y="184" width="44" height="52" fill="#a82a1d"/>
    <rect x="348" y="192" width="60" height="36" fill="#d83b2a"/>
    <rect x="356" y="184" width="44" height="44" fill="#d83b2a"/>
    <rect x="366" y="192" width="18" height="12" fill="#e85b48"/>
    <rect x="372" y="178" width="10" height="8" fill="#5d9c3c"/>
  </g>

  <!-- ===== baby carrots, left column ===== -->
  <g fill="#f08c3c">
    <rect x="74" y="276" width="36" height="92"/>
    <rect x="74" y="392" width="36" height="92"/>
    <rect x="74" y="500" width="36" height="64"/>
  </g>
  <g fill="#ffae5e">
    <rect x="80" y="282" width="10" height="80"/>
    <rect x="80" y="398" width="10" height="80"/>
    <rect x="80" y="506" width="10" height="52"/>
  </g>
  <g fill="#d2701f">
    <rect x="74" y="276" width="36" height="8"/>
    <rect x="74" y="392" width="36" height="8"/>
    <rect x="74" y="500" width="36" height="8"/>
  </g>

  <!-- ===== baby carrots, right column ===== -->
  <g fill="#f08c3c">
    <rect x="370" y="276" width="36" height="92"/>
    <rect x="370" y="392" width="36" height="92"/>
    <rect x="370" y="500" width="36" height="64"/>
  </g>
  <g fill="#ffae5e">
    <rect x="388" y="282" width="10" height="80"/>
    <rect x="388" y="398" width="10" height="80"/>
    <rect x="388" y="506" width="10" height="52"/>
  </g>
  <g fill="#d2701f">
    <rect x="370" y="276" width="36" height="8"/>
    <rect x="370" y="392" width="36" height="8"/>
    <rect x="370" y="500" width="36" height="8"/>
  </g>

  <!-- ===== parchment paper in the middle ===== -->
  <rect x="138" y="196" width="204" height="384" fill="#d9d4c2"/>
  <rect x="146" y="200" width="196" height="372" fill="#f2efe2"/>
  <rect x="158" y="210" width="40" height="352" fill="#ffffff" opacity="0.5"/>

  <!-- ===== two pita pockets side by side ===== -->
  <!-- left pita -->
  <g>
    <rect x="158" y="232" width="78" height="316" fill="#c79a5a"/>
    <rect x="164" y="238" width="66" height="304" fill="#e8c88f"/>
    <rect x="170" y="246" width="54" height="40" fill="#d9a85f"/>
    <!-- falafel crumbs -->
    <rect x="176" y="300" width="44" height="120" fill="#9c7a3a"/>
    <rect x="182" y="312" width="14" height="14" fill="#7a5e28"/>
    <rect x="200" y="334" width="14" height="14" fill="#7a5e28"/>
    <rect x="180" y="360" width="14" height="14" fill="#bb9450"/>
    <rect x="200" y="384" width="14" height="14" fill="#7a5e28"/>
    <!-- tahini drizzle -->
    <rect x="172" y="288" width="52" height="14" fill="#f2d98a"/>
    <rect x="186" y="302" width="18" height="120" fill="#f2d98a"/>
    <rect x="176" y="430" width="40" height="14" fill="#e9c45c"/>
  </g>

  <!-- right pita -->
  <g>
    <rect x="244" y="232" width="80" height="316" fill="#c79a5a"/>
    <rect x="250" y="238" width="68" height="304" fill="#efd9a8"/>
    <rect x="256" y="246" width="56" height="44" fill="#e3c891"/>
    <rect x="262" y="252" width="14" height="14" fill="#caa962"/>
    <rect x="292" y="262" width="14" height="14" fill="#caa962"/>
    <!-- falafel crumbs -->
    <rect x="262" y="306" width="44" height="116" fill="#9c7a3a"/>
    <rect x="268" y="320" width="14" height="14" fill="#7a5e28"/>
    <rect x="286" y="342" width="14" height="14" fill="#7a5e28"/>
    <rect x="266" y="368" width="14" height="14" fill="#bb9450"/>
    <rect x="288" y="392" width="14" height="14" fill="#7a5e28"/>
    <!-- tahini drizzle -->
    <rect x="258" y="296" width="52" height="14" fill="#f2d98a"/>
    <rect x="278" y="310" width="18" height="118" fill="#f2d98a"/>
    <rect x="262" y="436" width="42" height="14" fill="#e9c45c"/>
  </g>
</svg>
