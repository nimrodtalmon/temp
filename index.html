<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⛏ Ben's Lunchbox Gallery ⛏</title>
  <meta name="description" content="A pixel-art gallery of the lunchboxes we pack for Ben." />

  <!-- Pixel display font for headings; ingredient text uses a clean sans (see style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">⛏ BEN'S LUNCHBOX ⛏</h1>
    <p class="site-subtitle">Daily loot drops &middot; packed with love &amp; +crunch</p>
    <!-- thin grass-block strip -->
    <div class="grass-strip" aria-hidden="true">
      <div class="grass-strip__top"></div>
      <div class="grass-strip__dirt"></div>
    </div>
  </header>

  <main>
    <section id="gallery" class="gallery" aria-label="Lunchbox gallery">
      <!-- Cards are injected here by app.js -->
      <p class="gallery__status" id="status">Loading boxes&hellip;</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Crafted block by block for Ben. Eat well, mine on. ⛏</p>
  </footer>

  <!-- Lightbox / modal for the enlarged view -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" hidden>
    <div class="lightbox__backdrop" data-close></div>
    <div class="lightbox__panel" role="document">
      <button class="lightbox__close" type="button" data-close aria-label="Close">&times;</button>
      <img class="lightbox__img" id="lightbox-img" src="" alt="" />
      <div class="lightbox__info">
        <h2 class="lightbox__title" id="lightbox-title"></h2>
        <ul class="lightbox__ingredients" id="lightbox-ingredients"></ul>
        <p class="lightbox__note" id="lightbox-note"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
